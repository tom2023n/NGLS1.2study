<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <meta name="theme-color" content="#1565c0" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="NGSL常用词学习" />
    <title>NGSL常用词学习</title>
    <link rel="manifest" href="./manifest.json" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">NGSL 1.2</p>
          <h1>NGSL常用词学习</h1>
        </div>
        <button id="installBtn" class="ghost-btn hidden" type="button">
          添加到主屏
        </button>
      </header>

      <main class="main-content">
        <section class="hero">
          <div class="hero-copy">
            <p class="hero-label">今日学习</p>
            <h2 id="heroWordCount">2809 个核心词，随时开练</h2>
            <p id="heroSubtitle">
              闪卡、测验、收藏和复习进度都会自动保存在本机。
            </p>
            <div class="progress-block">
              <div class="progress-head">
                <span id="progressLabel">掌握进度 0%</span>
                <span id="streakCount">连续学习 0 天</span>
              </div>
              <div class="progress-track" aria-hidden="true">
                <div id="progressBar" class="progress-fill"></div>
              </div>
            </div>
          </div>

          <div class="hero-stats">
            <article class="stat">
              <span>已掌握</span>
              <strong id="masteredCount">0</strong>
            </article>
            <article class="stat">
              <span>今日完成</span>
              <strong id="todayCount">0</strong>
            </article>
            <article class="stat">
              <span>收藏词</span>
              <strong id="favoriteCount">0</strong>
            </article>
          </div>
        </section>

        <section class="toolbar">
          <label class="search">
            <input
              id="searchInput"
              type="search"
              placeholder="搜索单词、释义或词性"
              autocomplete="off"
            />
          </label>

          <div class="rank-row" id="rankChips">
            <button class="chip active" data-rank="all" type="button">
              全部词库
            </button>
            <button class="chip" data-rank="1-500" type="button">前 500</button>
            <button class="chip" data-rank="501-1000" type="button">
              501-1000
            </button>
            <button class="chip" data-rank="1001-1500" type="button">
              1001-1500
            </button>
            <button class="chip" data-rank="1501-2000" type="button">
              1501-2000
            </button>
            <button class="chip" data-rank="2001-2809" type="button">
              2001-2809
            </button>
          </div>

          <div class="chip-row" id="filterChips">
            <button class="chip active" data-filter="all" type="button">
              全部
            </button>
            <button class="chip" data-filter="unseen" type="button">未学</button>
            <button class="chip" data-filter="learning" type="button">
              学习中
            </button>
            <button class="chip" data-filter="mastered" type="button">
              已掌握
            </button>
            <button class="chip" data-filter="favorites" type="button">
              收藏
            </button>
          </div>
        </section>

        <section class="panel active" data-panel="study">
          <div class="panel-head">
            <div>
              <p class="section-kicker">闪卡模式</p>
              <h3>逐词学习</h3>
            </div>
            <div class="panel-actions">
              <button id="shuffleBtn" class="ghost-btn" type="button">
                随机抽词
              </button>
              <button id="speakBtn" class="ghost-btn" type="button">朗读</button>
              <button id="speakExampleBtn" class="ghost-btn" type="button">
                例句朗读
              </button>
              <button id="mistakeModeBtn" class="ghost-btn" type="button">
                错词优先
              </button>
            </div>
          </div>

          <article class="card-stack">
            <article
              id="flipCardBtn"
              class="word-card"
              tabindex="0"
              role="button"
              aria-label="翻转卡片"
            >
              <div class="card-face card-front">
                <p class="card-tag" id="studyOrder">#1</p>
                <h2 id="studyWord">the</h2>
                <p id="studyPronunciation" class="pronunciation">/ði/</p>
                <p id="studyPos" class="muted">det</p>
                <p id="studyHint" class="card-hint">点击查看释义和例句</p>
              </div>

              <div class="card-face card-back">
                <div class="back-header">
                  <div>
                    <p id="studyChinese" class="translation"></p>
                    <p id="studyPronunciationBack" class="pronunciation muted"></p>
                  </div>
                  <button
                    id="favoriteBtn"
                    class="icon-btn"
                    type="button"
                    aria-label="收藏单词"
                  >
                    ☆
                  </button>
                </div>
                <p id="studyDefinition" class="definition"></p>
                <blockquote id="studyExample" class="example"></blockquote>
                <p id="studyExampleChinese" class="example-cn muted"></p>
              </div>
            </article>

            <div class="mastery-actions">
              <button id="hardBtn" class="secondary-btn" type="button">
                还不熟
              </button>
              <button id="goodBtn" class="primary-btn" type="button">
                记住了
              </button>
            </div>

            <div class="pager">
              <button id="prevBtn" class="ghost-btn" type="button">上一个</button>
              <button id="nextBtn" class="ghost-btn" type="button">下一个</button>
            </div>
          </article>
        </section>

        <section class="panel" data-panel="quiz">
          <div class="panel-head">
            <div>
              <p class="section-kicker">选择题模式</p>
              <h3>快速测验</h3>
            </div>
            <button id="newQuizBtn" class="ghost-btn" type="button">
              换一题
            </button>
          </div>

          <article class="quiz-card">
            <p class="quiz-label">请选择最匹配的英文词</p>
            <h2 id="quizPrompt">loading...</h2>
            <div id="quizOptions" class="quiz-options"></div>
            <p id="quizFeedback" class="quiz-feedback"></p>
          </article>
        </section>

        <section class="panel" data-panel="review">
          <div class="panel-head">
            <div>
              <p class="section-kicker">复习与收藏</p>
              <h3>重点回看</h3>
            </div>
            <button id="resetProgressBtn" class="ghost-btn danger" type="button">
              重置进度
            </button>
          </div>

          <div class="review-grid">
            <article class="review-card">
              <h4>收藏单词</h4>
              <div id="favoritesList" class="word-list"></div>
            </article>
            <article class="review-card">
              <h4>最近学习</h4>
              <div id="recentList" class="word-list"></div>
            </article>
          </div>
        </section>
      </main>

      <nav class="tabbar">
        <button class="tab active" data-target="study" type="button">学习</button>
        <button class="tab" data-target="quiz" type="button">测验</button>
        <button class="tab" data-target="review" type="button">复习</button>
      </nav>
    </div>

    <script src="./words.js"></script>
    <script src="./app.js"></script>
  </body>
</html>
